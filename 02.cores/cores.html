<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cores</title>
    <link rel="stylesheet" href="cores.css">
</head>
<body>
    <h1>Cores</h1><br>
    <hr class="h-clr"><br><br><br>


    <!-- Modelo de cores em RGB -->
    <h2>Cores em RGB</h1>

    <div class="red div-rgb">Red</div>
    <div class="green div-rgb">Green</div>
    <div class="blue div-rgb">Blue</div>

    <hr><br>


    <!-- Modelo de cores em Hexadecimal -->
    <h2>Cores em Hexadecimal</h2>

    <div class="red-hexa div-hexadecimal">Red</div>
    <div class="green-hexa div-hexadecimal">Green</div>
    <div class="blue-hexa div-hexadecimal">Blue</div>

    <hr><br>


    <!-- Modelo de cores em HSL -->
    <h2>Cores em HSL(Hue, Saturation, Lightness)</h2>

    <div class="red-hsl div-hsl">Red</div>
    <div class="green-hsl div-hsl">Green</div>
    <div class="blue-hsl div-hsl">Blue</div>

    <hr><br>

    <!--  Transparência com RGBA e HSLA -->
      <h2>Transparência com RGBA e HSLA</h2>

        <div class="red-hsla div-hsla">Red</div>
        <div class="green-hsla div-hsla">Green</div>
        <div class="blue-hsla div-hsla">Blue</div>


      
      <hr><br>

      <!-- Cores por Palavra-chave -->
       <h2>Cores por Palavra-chave</h2>

       <p class="p-chave">Eu sou um parágrafo Darkcyan</p><br><br>



       <hr><br>

       <!-- Gradientes de Cor -->
       <h2>Gradient de cores</h2>

       <h3>Linear Gradient</h3>

       <div class="div-linearGradient"></div>

       <h3>Radial Gradient</h3>
       <div class="div-radialGradient"></div>
</body>
</html>
